        <h1>State Vesak festival to be held in Matara</h1>
        <p>Sri Lanka will host the 2026 State Vesak Festival in Matara. The Cabinet has approved holding the celebrations at the ancient Midellawala temple in Thihagoda. Vesak Week has been declared from May 27 to June 2.</p>
